<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pièce jointe — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    .viewer-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      z-index: 100;
    }
    .viewer-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    .viewer-back:hover { background: var(--bg); }
    .viewer-filename {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .viewer-download {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(205,164,67,.1);
      border: 1px solid rgba(205,164,67,.4);
      color: var(--primary);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    .viewer-content {
      margin-top: 52px;
      height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .viewer-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .viewer-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .file-card {
      text-align: center;
      padding: 40px;
    }
    .file-icon { font-size: 4rem; margin-bottom: 16px; }
    .file-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .file-size { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="viewer-bar">
    <button class="viewer-back" onclick="goBack()">← Retour</button>
    <span class="viewer-filename" id="filename">Chargement…</span>
    <a class="viewer-download" id="downloadLink" href="#" download>⬇ Télécharger</a>
  </div>

  <div class="viewer-content" id="viewerContent">
    <div style="color:var(--text-muted);font-size:14px">Chargement…</div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const attachId = params.get('id');
    const fromPage = params.get('from') || '/resa/gestion.html';

    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = fromPage;
      }
    }

    async function loadViewer() {
      if (!attachId) {
        document.getElementById('viewerContent').innerHTML = '<div style="color:var(--text-muted)">Fichier introuvable</div>';
        return;
      }

      // Récupère les métadonnées via l'URL du fichier
      const fileUrl = `/api/attachments/${attachId}/file`;
      const name = params.get('name') || 'Fichier';
      const mime = params.get('mime') || '';
      const size = parseInt(params.get('size') || '0');

      document.getElementById('filename').textContent = name;
      document.getElementById('downloadLink').href = fileUrl;
      document.getElementById('downloadLink').download = name;

      const content = document.getElementById('viewerContent');

      if (mime.startsWith('image/')) {
        content.innerHTML = `<img src="${fileUrl}" alt="${name}">`;
      } else if (mime === 'application/pdf') {
        content.innerHTML = `<iframe src="${fileUrl}#toolbar=1&view=FitH" title="${name}"></iframe>`;
      } else {
        const icon = mime.includes('word') ? '📝'
          : mime.includes('sheet') || mime.includes('excel') ? '📊'
          : '📄';
        const sizeStr = size > 1048576 ? (size/1048576).toFixed(1)+' Mo'
          : size > 1024 ? Math.round(size/1024)+' Ko'
          : size+' o';
        content.innerHTML = `
          <div class="file-card">
            <div class="file-icon">${icon}</div>
            <div class="file-name">${name}</div>
            <div class="file-size">${sizeStr}</div>
            <a class="viewer-download" href="${fileUrl}" download="${name}" style="display:inline-flex">⬇ Télécharger le fichier</a>
          </div>
        `;
      }
    }

    loadViewer();
  </script>
</body>
</html>
