<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Événements Joy.io — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    .joy-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    }
    .sync-info { font-size: 0.8rem; color: var(--text-muted); }

    /* Cartes événements */
    .joy-list { display: flex; flex-direction: column; gap: 10px; }
    .joy-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .joy-card.cancelled { border-left-color: var(--danger); opacity: 0.6; }
    .joy-date-block {
      flex-shrink: 0; text-align: center;
      background: var(--primary-dim); border-radius: 8px;
      padding: 8px 12px; min-width: 58px;
    }
    .joy-day   { font-size: 1.4rem; font-weight: 800; line-height: 1; color: var(--primary); }
    .joy-month { font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
    .joy-body  { flex: 1; min-width: 0; }
    .joy-name  { font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
    .joy-meta  { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.82rem; color: var(--text-muted); }
    .joy-meta span { display: flex; align-items: center; gap: 4px; }
    .joy-space { margin-top: 6px; font-size: 0.82rem; }
    .joy-space .badge-space {
      background: var(--primary-dim); color: var(--primary);
      padding: 3px 8px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    }
    .joy-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
    .joy-status {
      font-size: 0.72rem; font-weight: 700; padding: 3px 8px;
      border-radius: 20px;
    }
    .joy-status.confirmed { background: var(--success-bg); color: var(--success); }
    .joy-status.cancelled { background: var(--danger-bg);  color: var(--danger); }

    /* Filtres */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end; }
    .filters .form-group { margin: 0; }

    /* Config URL */
    .config-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    }
    .config-card summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }

    @media (max-width: 600px) {
      .joy-card { flex-direction: column; gap: 10px; }
      .joy-date-block { display: flex; align-items: center; gap: 10px; width: 100%; border-radius: 6px; }
      .joy-day { font-size: 1.1rem; }
      .joy-actions { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <div class="page">
    <div class="container-sm">

      <div class="page-header">
        <div>
          <div class="page-title">🎉 Événements Joy.io</div>
          <div class="page-subtitle">Réservations groupes & événements privés</div>
        </div>
        <button class="btn btn-primary" onclick="sync()" id="btnSync">🔄 Synchroniser</button>
      </div>

      <!-- Infos sync -->
      <div class="sync-info" id="syncInfo" style="margin-bottom:12px;"></div>

      <!-- Config URL (admin only) -->
      <details class="config-card" id="configSection" style="display:none;">
        <summary>⚙️ Configuration iCal</summary>
        <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end;">
          <div class="form-group" style="flex:1;min-width:200px;margin:0;">
            <label class="form-label">URL iCal Joy.io</label>
            <input type="url" id="icalUrl" class="form-input" placeholder="https://prvt.re/...">
          </div>
          <button class="btn btn-secondary" onclick="saveUrl()">Enregistrer</button>
        </div>
      </details>

      <!-- Filtres -->
      <div class="filters">
        <div class="form-group">
          <label class="form-label">Filtre</label>
          <select id="filterType" class="form-select" onchange="loadEvents()">
            <option value="upcoming">À venir</option>
            <option value="all">Tous</option>
            <option value="date">Par date</option>
          </select>
        </div>
        <div class="form-group" id="dateFilterGroup" style="display:none;">
          <label class="form-label">Date</label>
          <input type="date" id="filterDate" class="form-input" onchange="loadEvents()">
        </div>
      </div>

      <!-- Liste -->
      <div id="joyList"><div class="empty-state"><div class="empty-state-text">Chargement...</div></div></div>

    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    buildNav('joy');
    let userRole = null;

    const MONTHS = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];

    async function init() {
      const me = await api.get('/api/auth/me');
      if (!me) return;
      userRole = me.role;
      if (me.role === 'admin') {
        document.getElementById('configSection').style.display = '';
        const cfg = await api.get('/api/joy/config');
        if (cfg) {
          document.getElementById('icalUrl').value = cfg.url || '';
          showSyncInfo(cfg.lastSync);
        }
      } else {
        const cfg = await api.get('/api/joy/config');
        if (cfg) showSyncInfo(cfg.lastSync);
      }
      loadEvents();
    }

    function showSyncInfo(lastSync) {
      const el = document.getElementById('syncInfo');
      if (!lastSync) { el.textContent = 'Jamais synchronisé'; return; }
      const d = new Date(lastSync);
      el.textContent = `Dernière sync : ${d.toLocaleDateString('fr-FR')} à ${d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}`;
    }

    document.getElementById('filterType').addEventListener('change', function() {
      document.getElementById('dateFilterGroup').style.display = this.value === 'date' ? '' : 'none';
    });

    async function loadEvents() {
      const type = document.getElementById('filterType').value;
      const date = document.getElementById('filterDate').value;
      let url = '/api/joy/events';
      if (type === 'upcoming') url += '?upcoming=1';
      else if (type === 'date' && date) url += `?date=${date}`;
      const events = await api.get(url);
      renderEvents(events || []);
    }

    function renderEvents(events) {
      const container = document.getElementById('joyList');
      if (!events.length) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div class="empty-state-text">Aucun événement trouvé</div>
          <div class="empty-state-sub">Cliquez sur "Synchroniser" pour importer depuis Joy.io</div>
        </div>`;
        return;
      }

      container.innerHTML = `<div class="joy-list">${events.map(ev => {
        const d = ev.date ? new Date(ev.date + 'T12:00:00') : null;
        const day   = d ? d.getDate() : '?';
        const month = d ? MONTHS[d.getMonth()] : '';
        const timeRange = [ev.time_start, ev.time_end].filter(Boolean).join(' → ');
        const isCancelled = ev.status === 'cancelled';

        return `<div class="joy-card ${isCancelled ? 'cancelled' : ''}">
          <div class="joy-date-block">
            <div class="joy-day">${day}</div>
            <div class="joy-month">${month}</div>
          </div>
          <div class="joy-body">
            <div class="joy-name">${ev.customer_name || '—'}</div>
            <div class="joy-meta">
              ${ev.participants ? `<span>👥 ${ev.participants} pers.</span>` : ''}
              ${timeRange ? `<span>🕐 ${timeRange}</span>` : ''}
            </div>
            ${ev.space ? `<div class="joy-space"><span class="badge-space">📍 ${ev.space}</span></div>` : ''}
            ${ev.raw_description && ev.raw_description !== ev.raw_summary ? `
              <div style="font-size:0.78rem;color:var(--text-muted);margin-top:6px;line-height:1.4;">
                ${ev.raw_description.substring(0, 120)}${ev.raw_description.length > 120 ? '…' : ''}
              </div>` : ''}
          </div>
          <div class="joy-actions">
            <span class="joy-status ${ev.status}">${ev.status === 'confirmed' ? '✅ Confirmé' : '❌ Annulé'}</span>
            ${userRole === 'admin' || userRole === 'manager' ? `<button class="btn-del" onclick="deleteEvent(${ev.id})" title="Supprimer">🗑</button>` : ''}
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    async function sync() {
      const btn = document.getElementById('btnSync');
      btn.disabled = true;
      btn.textContent = '⏳ Sync...';
      const result = await api.post('/api/joy/sync', {});
      btn.disabled = false;
      btn.textContent = '🔄 Synchroniser';
      if (result?.error) {
        showToast('❌ ' + result.error, 'error');
      } else {
        showToast(`✅ ${result.synced} événements synchronisés`, 'success');
        showSyncInfo(new Date().toISOString());
        loadEvents();
      }
    }

    async function saveUrl() {
      const url = document.getElementById('icalUrl').value.trim();
      if (!url) return;
      await api.put('/api/joy/config', { url });
      showToast('URL enregistrée', 'success');
    }

    async function deleteEvent(id) {
      if (!confirm('Supprimer cet événement ?')) return;
      await api.delete(`/api/joy/events/${id}`);
      showToast('Événement supprimé', 'success');
      loadEvents();
    }

    init();
  </script>
</body>
</html>
