<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Équipe — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
</head>
<body>
  <nav class="nav" id="nav"></nav>

  <div class="page">
    <div class="container-sm">
      <div class="page-header">
        <div>
          <div class="page-title">👥 Gestion de l'équipe</div>
          <div class="page-subtitle">Créez et gérez les codes PIN de votre staff</div>
        </div>
        <button class="btn btn-primary" onclick="showModal('addModal')">+ Ajouter un membre</button>
      </div>

      <div class="card">
        <div id="staffList">
          <div class="empty-state">
            <div class="empty-state-icon">👤</div>
            <div class="empty-state-text">Chargement...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay hidden" id="addModal" onclick="closeOnOverlay(event,'addModal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Ajouter un membre</div>
        <button class="modal-close" onclick="hideModal('addModal')">✕</button>
      </div>
      <form id="staffForm" onsubmit="saveStaff(event)">
        <input type="hidden" id="staffId">
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="form-group">
            <label class="form-label">Prénom / Nom</label>
            <input type="text" id="staffName" placeholder="Ex: Julie Martin" required>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">Code PIN (4-6 chiffres)</label>
              <input type="text" id="staffPin" placeholder="Ex: 1234" maxlength="6" pattern="[0-9]{4,6}" required inputmode="numeric">
            </div>
            <div class="form-group">
              <label class="form-label">Poste</label>
              <select id="staffPoste">
                <option value="staff_midi">🌅 Staff Midi</option>
                <option value="staff_soir">🌙 Staff Soir</option>
                <option value="manager_midi">⭐🌅 Manager Midi</option>
                <option value="manager_soir">⭐🌙 Manager Soir</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email <span style="color:var(--text-muted);font-weight:400;">(pour recevoir le planning)</span></label>
            <input type="email" id="staffEmail" placeholder="prenom.nom@email.com">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="hideModal('addModal')">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-overlay hidden" id="deleteModal" onclick="closeOnOverlay(event,'deleteModal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Supprimer le membre</div>
        <button class="modal-close" onclick="hideModal('deleteModal')">✕</button>
      </div>
      <p style="color:var(--text-muted);font-size:0.9rem;">Êtes-vous sûr de vouloir désactiver <strong id="deleteStaffName"></strong> ? Cette personne ne pourra plus se connecter.</p>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="hideModal('deleteModal')">Annuler</button>
        <button type="button" class="btn btn-danger" onclick="confirmDelete()">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    buildNav('equipe');
    let deleteId = null;

    async function loadStaff() {
      const staff = await api.get('/api/admin/staff');
      if (!staff) return;

      const container = document.getElementById('staffList');
      if (!staff.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">👤</div><div class="empty-state-text">Aucun membre dans l'équipe</div></div>`;
        return;
      }

      const posteLabel = s => {
        if (s.role === 'admin') return { label: '👑 Admin', cls: 'badge-primary' };
        if (s.role === 'manager' && s.shift === 'midi') return { label: '⭐🌅 Manager Midi', cls: 'badge-warning' };
        if (s.role === 'manager' && s.shift === 'soir') return { label: '⭐🌙 Manager Soir', cls: 'badge-warning' };
        if (s.shift === 'midi') return { label: '🌅 Staff Midi', cls: 'badge-info' };
        if (s.shift === 'soir') return { label: '🌙 Staff Soir', cls: 'badge-muted' };
        return { label: s.role, cls: 'badge-muted' };
      };

      container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Nom</th><th>PIN</th><th>Poste</th><th>Statut</th><th></th>
            </tr></thead>
            <tbody>
              ${staff.map(s => {
                const p = posteLabel(s);
                return `
                <tr>
                  <td><strong>${s.name}</strong></td>
                  <td><span style="font-family:monospace;font-size:1rem;letter-spacing:2px;color:var(--primary);">${s.pin}</span></td>
                  <td><span class="badge ${p.cls}">${p.label}</span></td>
                  <td><span class="badge ${s.active ? 'badge-success' : 'badge-danger'}">${s.active ? 'Actif' : 'Inactif'}</span></td>
                  <td>
                    <div style="display:flex;gap:6px;justify-content:flex-end;">
                      ${s.role !== 'admin' ? `
                        <button class="btn btn-secondary btn-sm" onclick="editStaff(${JSON.stringify(s).replace(/"/g, '&quot;')})">Modifier</button>
                        <button class="btn btn-danger btn-sm" onclick="askDelete(${s.id},'${s.name}')">Supprimer</button>
                      ` : ''}
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function editStaff(s) {
      document.getElementById('modalTitle').textContent = 'Modifier un membre';
      document.getElementById('staffId').value = s.id;
      document.getElementById('staffName').value = s.name;
      document.getElementById('staffPin').value = s.pin;
      const poste = (s.role === 'manager' ? 'manager' : 'staff') + '_' + (s.shift || 'midi');
      document.getElementById('staffPoste').value = poste;
      document.getElementById('staffEmail').value = s.email || '';
      showModal('addModal');
    }

    function openAdd() {
      document.getElementById('modalTitle').textContent = 'Ajouter un membre';
      document.getElementById('staffId').value = '';
      document.getElementById('staffForm').reset();
      showModal('addModal');
    }
    document.querySelector('[onclick="showModal(\'addModal\')"]').onclick = openAdd;

    async function saveStaff(e) {
      e.preventDefault();
      const id = document.getElementById('staffId').value;
      const poste = document.getElementById('staffPoste').value; // ex: "staff_midi", "manager_soir"
      const [role, shift] = poste.split('_');
      const body = {
        name: document.getElementById('staffName').value.trim(),
        pin: document.getElementById('staffPin').value.trim(),
        role,
        shift,
        email: document.getElementById('staffEmail').value.trim() || null,
      };

      let result;
      if (id) {
        result = await api.put(`/api/admin/staff/${id}`, body);
      } else {
        result = await api.post('/api/admin/staff', body);
      }

      if (result?.error) {
        showToast(result.error, 'error');
        return;
      }
      hideModal('addModal');
      showToast(id ? 'Membre mis à jour ✓' : 'Membre ajouté ✓', 'success');
      loadStaff();
    }

    function askDelete(id, name) {
      deleteId = id;
      document.getElementById('deleteStaffName').textContent = name;
      showModal('deleteModal');
    }

    async function confirmDelete() {
      if (!deleteId) return;
      const result = await api.delete(`/api/admin/staff/${deleteId}`);
      if (result?.error) { showToast(result.error, 'error'); return; }
      hideModal('deleteModal');
      showToast('Membre supprimé', 'info');
      loadStaff();
    }

    loadStaff();
  </script>
</body>
</html>
