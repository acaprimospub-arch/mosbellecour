<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Réservations — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    /* ── Week nav ── */
    .week-nav { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .week-nav-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:7px 14px; font-size:.82rem; cursor:pointer; white-space:nowrap; }
    .week-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .week-label { font-weight:700; font-size:.92rem; }

    /* ── Alerte sans table ── */
    .no-table-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(251,146,60,.08);
      border: 1px solid rgba(251,146,60,.35);
      border-radius: 12px;
      padding: 11px 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .no-table-banner:hover { background: rgba(251,146,60,.13); }
    .no-table-banner-text { flex:1; font-size:.85rem; }
    .no-table-banner-text strong { color: #fb923c; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .filter-bar input, .filter-bar select {
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 10px;
      font-size:.83rem; flex:1; min-width:100px;
    }
    .filter-bar input::placeholder { color: var(--text-muted); }
    .filter-toggle {
      padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text-muted); cursor: pointer;
      font-size:.8rem; font-weight:600; white-space:nowrap; transition:.15s;
    }
    .filter-toggle.active { background:rgba(251,146,60,.15); border-color:#fb923c; color:#fb923c; }

    /* ── Day column ── */
    .week-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
    }
    @media (max-width: 1100px) { .week-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 700px)  { .week-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 450px)  { .week-grid { grid-template-columns: 1fr; } }

    .day-col {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .day-col.is-today { border-color: var(--primary); }
    .day-head {
      padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .day-name  { font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); }
    .day-date  { font-size:.82rem; font-weight:700; }
    .day-col.is-today .day-name { color:var(--primary); }
    .day-count { font-size:.7rem; font-weight:700; padding:2px 7px; border-radius:99px; background:var(--primary-dim); color:var(--primary); }
    .day-body  { padding: 8px; min-height: 60px; }

    /* ── Resa mini card ── */
    .rmc {
      border-radius: 8px; padding: 7px 9px; margin-bottom: 6px;
      cursor: pointer; border-left: 3px solid transparent; transition: opacity .15s;
    }
    .rmc:last-child { margin-bottom: 0; }
    .rmc:hover { opacity: .8; }
    .rmc.confirmed { background:rgba(96,165,250,.1);  border-left-color:#60a5fa; }
    .rmc.arrived   { background:rgba(34,197,94,.1);   border-left-color:#22c55e; }
    .rmc.no_show   { background:rgba(239,68,68,.1);   border-left-color:#ef4444; }
    .rmc.cancelled { background:rgba(255,255,255,.04); border-left-color:rgba(255,255,255,.15); opacity:.5; }
    .rmc-top  { display:flex; align-items:center; gap:5px; }
    .rmc-time { font-size:.75rem; font-weight:800; min-width:34px; }
    .rmc-name { font-size:.78rem; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rmc-pax  { font-size:.7rem; color:var(--text-muted); margin-top:2px; display:flex; align-items:center; gap:4px; }
    .no-table-tag {
      font-size:.62rem; font-weight:700; color:#fb923c;
      background:rgba(251,146,60,.15); border-radius:4px; padding:1px 5px;
    }
    .table-tag {
      font-size:.62rem; font-weight:700; color:#22c55e;
      background:rgba(34,197,94,.12); border-radius:4px; padding:1px 5px;
    }
    .joy-icon { font-size:.65rem; }
    .day-add { text-align:center; padding:6px; font-size:.72rem; color:var(--text-muted); cursor:pointer; border-radius:6px; }
    .day-add:hover { background:var(--bg-hover); color:var(--primary); }

    /* ── Drawer ── */
    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer {
      position:fixed; bottom:0; left:0; right:0; z-index:201;
      background:var(--bg-card); border-radius:20px 20px 0 0;
      box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%);
      transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column;
    }
    .drawer.open { transform:translateY(0); }
    @media (min-width:641px) {
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:480px; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head   { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title  { font-size:1rem; font-weight:700; }
    .drawer-close  { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:.9rem; cursor:pointer; border:none; }
    .drawer-body   { overflow-y:auto; padding:16px 20px; flex:1; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }
    .frow   { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Table assign button ── */
    .table-assign-box {
      display: flex; flex-direction: column; gap: 10px;
    }
    .table-assigned-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .assigned-tag {
      padding: 4px 10px; border-radius: 8px;
      background: rgba(34,197,94,.12); color: #22c55e;
      font-size: .78rem; font-weight: 700; border: 1px solid rgba(34,197,94,.3);
    }
    .no-assigned-label {
      font-size: .82rem; color: var(--text-muted); font-style: italic;
    }
    .btn-assign-plan {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 10px;
      background: rgba(11,45,62,.6); border: 1.5px solid var(--border);
      color: var(--text); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: .15s; width: 100%; justify-content: center;
    }
    .btn-assign-plan:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }

    /* ── Pièces jointes ── */
    .attach-section { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
    .attach-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .attach-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
    .attach-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--bg-surface); border:1px solid var(--border); border-radius:8px; }
    .attach-icon { font-size:1.1rem; flex-shrink:0; }
    .attach-info { flex:1; min-width:0; }
    .attach-name { font-size:.82rem; font-weight:600; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .attach-meta { font-size:.72rem; color:var(--text-muted); }
    .attach-btn-open { background:rgba(205,164,67,.12); border:1.5px solid rgba(205,164,67,.3); color:var(--primary); border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .attach-btn-del  { background:rgba(232,84,84,.1); border:1.5px solid rgba(232,84,84,.3); color:var(--danger); border-radius:6px; padding:4px 8px; font-size:.75rem; cursor:pointer; flex-shrink:0; }
    .attach-upload-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:10px; background:var(--bg-surface); border:1.5px dashed var(--border); border-radius:8px; color:var(--text-muted); font-size:.83rem; font-weight:600; cursor:pointer; transition:border-color .15s,color .15s; }
    .attach-upload-btn:hover { border-color:var(--primary); color:var(--primary); }
    .attach-upload-btn input[type="file"] { display:none; }

    /* ── Status pills ── */
    .status-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .status-btn {
      flex:1; min-width:80px; padding:9px 6px; border-radius:10px; border:1.5px solid transparent;
      font-size:.8rem; font-weight:700; cursor:pointer; text-align:center; transition:.15s;
    }
    .status-btn.confirmed { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.35); color:#60a5fa; }
    .status-btn.arrived   { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.35);  color:#4ade80; }
    .status-btn.no_show   { background:rgba(239,68,68,.12);  border-color:rgba(239,68,68,.35);  color:#f87171; }
    .status-btn.cancelled { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.2); color:var(--text-muted); }
    .status-btn.active    { filter:brightness(1.3); box-shadow:0 0 0 2px currentColor; }
    .status-btn:hover     { filter:brightness(1.2); }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>

  <div class="page">
    <div class="container">

      <!-- Header -->
      <div class="page-header" style="margin-bottom:20px;">
        <div>
          <div class="page-title">📋 Réservations</div>
          <div class="page-subtitle" id="weekSubtitle"></div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">+ Nouvelle</button>
      </div>

      <!-- Bannière sans table -->
      <div id="noTableBanner" class="no-table-banner hidden" onclick="toggleNoTable()">
        <span style="font-size:1.2rem">⚠️</span>
        <div class="no-table-banner-text">
          <strong id="noTableCount">0</strong> réservation(s) sans table assignée cette semaine
        </div>
        <span id="noTableBannerBtn" style="font-size:.8rem;color:#fb923c;font-weight:700;">Voir →</span>
      </div>

      <!-- Week nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;">
        <div class="week-nav">
          <button class="week-nav-btn" onclick="shiftWeek(-1)">← Semaine préc.</button>
          <span class="week-label" id="weekLabel"></span>
          <button class="week-nav-btn" onclick="shiftWeek(1)">Semaine suiv. →</button>
        </div>
        <button class="week-nav-btn" onclick="goToday()">Aujourd'hui</button>
      </div>

      <!-- Filtres -->
      <div class="filter-bar">
        <input type="text" id="filterName" placeholder="🔍 Rechercher un nom…" oninput="applyFilters()">
        <select id="filterSpace" onchange="applyFilters()">
          <option value="">Tous les espaces</option>
        </select>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">Tous les statuts</option>
          <option value="confirmed">Confirmées</option>
          <option value="arrived">Arrivées</option>
          <option value="no_show">No-shows</option>
          <option value="cancelled">Annulées</option>
        </select>
        <button class="filter-toggle" id="filterNoTable" onclick="toggleNoTable()">⚠️ Sans table</button>
      </div>

      <!-- Grille semaine -->
      <div class="week-grid" id="weekGrid"></div>

    </div>
  </div>

  <!-- Backdrop -->
  <div class="drawer-backdrop" id="backdrop" onclick="closeDrawer()"></div>

  <!-- Drawer création / édition -->
  <div class="drawer" id="mainDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="drawerTitle">Nouvelle réservation</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <form id="resaForm" onsubmit="saveResa(event)">
        <input type="hidden" id="resaId">
        <div class="frow">

          <div class="fgroup">
            <label>Nom du client</label>
            <input type="text" id="resaName" placeholder="Ex: Dupont" required>
          </div>

          <div class="f2">
            <div class="fgroup">
              <label>Date</label>
              <input type="date" id="resaDate" required>
            </div>
            <div class="fgroup">
              <label>Heure</label>
              <input type="time" id="resaTime" required>
            </div>
          </div>

          <div class="f2">
            <div class="fgroup">
              <label>Nb de personnes</label>
              <input type="number" id="resaPax" min="1" max="200" value="2" required>
            </div>
            <div class="fgroup">
              <label>Téléphone</label>
              <input type="tel" id="resaPhone" placeholder="06…">
            </div>
          </div>

          <div class="fgroup">
            <label>Espace</label>
            <select id="resaSpace">
              <option value="">Non précisé</option>
              <option value="salle_bas">Salle Bas</option>
              <option value="etage">Étage</option>
              <option value="terrasse">Terrasse</option>
              <option value="coin_canap">Coin Canapé</option>
            </select>
          </div>

          <!-- Table assign (via plan de salle) -->
          <div class="fgroup">
            <label>Tables assignées</label>
            <div class="table-assign-box">
              <div class="table-assigned-tags" id="assignedTagsDisplay">
                <span class="no-assigned-label">Aucune table assignée</span>
              </div>
              <button type="button" class="btn-assign-plan" id="btnAssignPlan" onclick="goToFloorPlan()">
                🗺️ Assigner via le plan de salle
              </button>
            </div>
          </div>

          <div class="fgroup">
            <label>Notes</label>
            <input type="text" id="resaNotes" placeholder="Allergies, demandes spéciales…">
          </div>

          <!-- Statut (édition seulement) -->
          <div id="statusSection" style="display:none;">
            <div class="fgroup">
              <label>Statut</label>
              <div class="status-btns">
                <div class="status-btn confirmed" onclick="setStatus('confirmed')">✉ Confirmée</div>
                <div class="status-btn arrived"   onclick="setStatus('arrived')">✅ Arrivée</div>
                <div class="status-btn no_show"   onclick="setStatus('no_show')">❌ No-show</div>
                <div class="status-btn cancelled" onclick="setStatus('cancelled')">🚫 Annulée</div>
              </div>
            </div>
          </div>

        </div>
      </form>

      <!-- Pièces jointes (visibles en mode édition seulement) -->
      <div class="attach-section" id="attachSection" style="display:none;">
        <div class="attach-title">📎 Pièces jointes</div>
        <div id="attachList" class="attach-list"></div>
        <label class="attach-upload-btn">
          <input type="file" id="attachInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" onchange="uploadAttachment(this)">
          📎 Ajouter un fichier
        </label>
      </div>

    </div>
    <div class="drawer-footer">
      <button class="btn btn-danger btn-sm" id="btnDelete" style="flex:0 0 auto;padding:0 16px;display:none;" onclick="deleteResa()">🗑</button>
      <button class="btn btn-secondary" onclick="closeDrawer()">Annuler</button>
      <button type="submit" form="resaForm" class="btn btn-primary" id="btnSave">Enregistrer</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('marketing-reservations');
    const socket = io();

    function _canManageAttachments() {
      const u = window.__mosUser;
      return u && (u.role === 'admin' || u.role === 'manager');
    }

    const DAYS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const ZONE_LABELS = { salle_bas:'Salle Bas', etage:'Étage', terrasse:'Terrasse', coin_canap:'Coin Canapé' };

    let currentWeekStart = getMonday(new Date());
    let allResas      = [];
    let allTables     = [];
    let currentStatus = 'confirmed';
    let editId        = null;
    let editDate      = null;
    let filterNoTable = false;

    function getMonday(d) {
      const dt = new Date(d); const day = dt.getDay();
      dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
      return dt.toISOString().split('T')[0];
    }
    function addDays(s, n) {
      const d = new Date(s); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0];
    }
    function fmtWeek(ws) {
      const we = addDays(ws,6); const s = new Date(ws+'T12:00'); const e = new Date(we+'T12:00');
      return `${s.getDate()} ${s.toLocaleDateString('fr-FR',{month:'short'})} → ${e.getDate()} ${e.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
    }

    function shiftWeek(d) { currentWeekStart = addDays(currentWeekStart, d*7); loadWeek(); }
    function goToday()    { currentWeekStart = getMonday(new Date()); loadWeek(); }

    // ─── Load ─────────────────────────────────────────────────────
    async function init() {
      allTables = await api.get('/api/tables') || [];
      loadWeek();
    }

    async function loadWeek() {
      document.getElementById('weekLabel').textContent    = fmtWeek(currentWeekStart);
      document.getElementById('weekSubtitle').textContent = `Semaine du ${formatDate(currentWeekStart)}`;

      const from = currentWeekStart;
      const to   = addDays(currentWeekStart, 6);
      const data = await api.get(`/api/reservations/range?from=${from}&to=${to}`);
      if (!data) return;
      allResas = data;

      // Bannière sans table
      const noTable = allResas.filter(r => r.status !== 'cancelled' && (!r.table_ids || r.table_ids.length === 0));
      const banner = document.getElementById('noTableBanner');
      if (noTable.length > 0) {
        document.getElementById('noTableCount').textContent = noTable.length;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
        if (filterNoTable) toggleNoTable(); // reset filter if no more unassigned
      }

      // Space filter
      const spaces = [...new Set(data.map(r => r.space).filter(Boolean))].sort();
      const sel = document.getElementById('filterSpace');
      const prev = sel.value;
      sel.innerHTML = '<option value="">Tous les espaces</option>' +
        spaces.map(s => `<option value="${s}" ${s===prev?'selected':''}>${s}</option>`).join('');

      applyFilters();
    }

    // ─── Filters ──────────────────────────────────────────────────
    function toggleNoTable() {
      filterNoTable = !filterNoTable;
      document.getElementById('filterNoTable').classList.toggle('active', filterNoTable);
      document.getElementById('noTableBannerBtn').textContent = filterNoTable ? 'Masquer ✕' : 'Voir →';
      applyFilters();
    }

    function applyFilters() {
      const name   = document.getElementById('filterName').value.trim().toLowerCase();
      const space  = document.getElementById('filterSpace').value;
      const status = document.getElementById('filterStatus').value;

      let filtered = allResas;
      if (name)         filtered = filtered.filter(r => r.customer_name.toLowerCase().includes(name));
      if (space)        filtered = filtered.filter(r => r.space === space);
      if (status)       filtered = filtered.filter(r => r.status === status);
      if (filterNoTable) filtered = filtered.filter(r => r.status !== 'cancelled' && (!r.table_ids || r.table_ids.length === 0));

      renderWeek(filtered);
    }

    // ─── Render week ──────────────────────────────────────────────
    function renderWeek(resas) {
      const todayStr = today();
      const grid     = document.getElementById('weekGrid');
      const dayDates = Array.from({length:7}, (_, i) => addDays(currentWeekStart, i));

      grid.innerHTML = dayDates.map(dd => {
        const isToday  = dd === todayStr;
        const dayResas = resas.filter(r => r.date === dd);
        const d        = new Date(dd+'T12:00');
        const dowIdx   = d.getDay();

        const cards = dayResas.map(r => {
          const noTable  = !r.table_ids || r.table_ids.length === 0;
          const joyIcon  = r.joy_event_id ? `<span class="joy-icon" title="Joy.io">🔗</span> ` : '';
          const tableTag = noTable
            ? `<span class="no-table-tag">⚠ sans table</span>`
            : `<span class="table-tag">T.${r.table_names.join('+')}</span>`;
          return `
            <div class="rmc ${r.status}" onclick="openEdit(${r.id})">
              <div class="rmc-top">
                <span class="rmc-time">${r.time}</span>
                <span class="rmc-name">${joyIcon}${r.customer_name}</span>
              </div>
              <div class="rmc-pax">
                ${r.party_size} pers. &nbsp;${tableTag}
              </div>
            </div>`;
        }).join('');

        return `
          <div class="day-col ${isToday?'is-today':''}">
            <div class="day-head">
              <div>
                <div class="day-name">${DAYS_FR[dowIdx]}</div>
                <div class="day-date">${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'short'})}</div>
              </div>
              ${dayResas.length ? `<div class="day-count">${dayResas.length}</div>` : ''}
            </div>
            <div class="day-body">
              ${cards}
              <div class="day-add" onclick="openCreate('${dd}')">+ Ajouter</div>
            </div>
          </div>`;
      }).join('');
    }

    // ─── Table display (assigned via floor plan) ──────────────────
    function refreshAssignedDisplay(tableIds) {
      const box = document.getElementById('assignedTagsDisplay');
      if (!tableIds || tableIds.length === 0) {
        box.innerHTML = '<span class="no-assigned-label">Aucune table assignée</span>';
      } else {
        const names = tableIds.map(id => allTables.find(t => t.id === id)?.name || `T.${id}`);
        box.innerHTML = names.map(n => `<span class="assigned-tag">🍽 ${n}</span>`).join('');
      }
    }

    async function goToFloorPlan() {
      const name  = document.getElementById('resaName').value.trim();
      const date  = document.getElementById('resaDate').value;
      const returnPath = encodeURIComponent('/marketing/reservations.html');

      if (editId) {
        // Mode édition : on a déjà un ID, on peut sauvegarder et rediriger
        const body = {
          customer_name: name,
          date,
          time:       document.getElementById('resaTime').value,
          party_size: parseInt(document.getElementById('resaPax').value),
          phone:      document.getElementById('resaPhone').value.trim() || null,
          space:      document.getElementById('resaSpace').value || null,
          notes:      document.getElementById('resaNotes').value.trim() || null,
          status:     currentStatus,
        };
        await api.put(`/api/reservations/${editId}`, body);
        window.location.href = `/staff/tables.html?assignTo=${editId}&date=${date}&name=${encodeURIComponent(name)}&returnTo=${returnPath}`;
      } else {
        // Mode création : créer la résa d'abord, puis rediriger vers le plan
        if (!name || !date) { showToast('Remplis au moins le nom et la date', 'warning'); return; }
        const body = {
          customer_name: name,
          date,
          time:       document.getElementById('resaTime').value || '12:00',
          party_size: parseInt(document.getElementById('resaPax').value) || 2,
          phone:      document.getElementById('resaPhone').value.trim() || null,
          space:      document.getElementById('resaSpace').value || null,
          notes:      document.getElementById('resaNotes').value.trim() || null,
          status:     'confirmed',
        };
        const created = await api.post('/api/reservations', body);
        if (!created?.id) { showToast('Erreur lors de la création', 'error'); return; }
        window.location.href = `/staff/tables.html?assignTo=${created.id}&date=${date}&name=${encodeURIComponent(name)}&returnTo=${returnPath}`;
      }
    }

    // ─── Drawer create ────────────────────────────────────────────
    function openCreate(date) {
      editId = null;
      editDate = date || today();
      currentStatus = 'confirmed';
      document.getElementById('drawerTitle').textContent = 'Nouvelle réservation';
      document.getElementById('resaId').value    = '';
      document.getElementById('resaName').value  = '';
      document.getElementById('resaDate').value  = editDate;
      document.getElementById('resaTime').value  = '12:00';
      document.getElementById('resaPax').value   = 2;
      document.getElementById('resaPhone').value = '';
      document.getElementById('resaSpace').value = '';
      document.getElementById('resaNotes').value = '';
      document.getElementById('statusSection').style.display  = 'none';
      document.getElementById('btnDelete').style.display      = 'none';
      document.getElementById('attachSection').style.display  = 'none';
      document.getElementById('btnSave').textContent = 'Créer';
      refreshAssignedDisplay([]);
      openDrawer();
    }

    async function openEdit(id) {
      const r = allResas.find(r => r.id === id);
      if (!r) return;
      editId = id;
      editDate = r.date;
      currentStatus = r.status;
      document.getElementById('drawerTitle').textContent = `Modifier · ${r.customer_name}`;
      document.getElementById('resaId').value    = r.id;
      document.getElementById('resaName').value  = r.customer_name;
      document.getElementById('resaDate').value  = r.date;
      document.getElementById('resaTime').value  = r.time;
      document.getElementById('resaPax').value   = r.party_size;
      document.getElementById('resaPhone').value = r.phone || '';
      document.getElementById('resaSpace').value = r.space || '';
      document.getElementById('resaNotes').value = r.notes || '';
      document.getElementById('statusSection').style.display = 'block';
      document.getElementById('btnDelete').style.display = r.joy_event_id ? 'none' : 'inline-flex';
      document.getElementById('btnSave').textContent = 'Enregistrer';
      document.getElementById('attachSection').style.display = 'block';
      updateStatusBtns();
      refreshAssignedDisplay(r.table_ids || []);
      openDrawer();
      loadAttachments(id);
    }

    // ─── Pièces jointes ───────────────────────────────────────────
    function _attachIcon(mime) {
      if (!mime) return '📄';
      if (mime.startsWith('image/')) return '🖼️';
      if (mime === 'application/pdf') return '📕';
      if (mime.includes('word') || mime.includes('document')) return '📝';
      if (mime.includes('excel') || mime.includes('spreadsheet')) return '📊';
      return '📄';
    }
    function _fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' o';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' Ko';
      return (bytes/1024/1024).toFixed(1) + ' Mo';
    }

    async function loadAttachments(resId) {
      const list = document.getElementById('attachList');
      if (!list) return;
      const atts = await api.get(`/api/reservations/${resId}/attachments`);
      if (!atts) return;

      const canManage = _canManageAttachments();

      // Bouton upload : visible seulement pour admin/manager
      const uploadBtn = document.querySelector('#attachSection .attach-upload-btn');
      if (uploadBtn) uploadBtn.style.display = canManage ? 'flex' : 'none';

      if (!atts.length) {
        list.innerHTML = `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Aucune pièce jointe</div>`;
        return;
      }
      list.innerHTML = atts.map(a => `
        <div class="attach-item" id="att-${a.id}">
          <div class="attach-icon">${_attachIcon(a.mimetype)}</div>
          <div class="attach-info">
            <div class="attach-name" title="${a.original_name}">${a.original_name}</div>
            <div class="attach-meta">${_fmtSize(a.size)}${a.uploader_name ? ' · ' + a.uploader_name : ''}</div>
          </div>
          <button class="attach-btn-open" onclick="window.open('/api/attachments/${a.id}/file','_blank')">Voir</button>
          ${canManage ? `<button class="attach-btn-del" onclick="deleteAttachment(${a.id},${resId})" title="Supprimer">✕</button>` : ''}
        </div>
      `).join('');
    }

    async function uploadAttachment(input) {
      if (!input.files.length || !editId) return;
      const file = input.files[0];
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(`/api/reservations/${editId}/attachments`, { method:'POST', body:fd });
      input.value = '';
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        showToast(err.error || 'Erreur upload', 'error');
        return;
      }
      showToast('Fichier ajouté ✓', 'success');
      loadAttachments(editId);
    }

    async function deleteAttachment(attId, resId) {
      if (!confirm('Supprimer cette pièce jointe ?')) return;
      const res = await api.delete(`/api/attachments/${attId}`);
      if (res?.ok) {
        showToast('Pièce jointe supprimée', 'info');
        loadAttachments(resId);
      }
    }

    function setStatus(s) { currentStatus = s; updateStatusBtns(); }
    function updateStatusBtns() {
      document.querySelectorAll('.status-btn').forEach(b =>
        b.classList.toggle('active', b.classList.contains(currentStatus))
      );
    }

    // ─── Save ─────────────────────────────────────────────────────
    async function saveResa(e) {
      e.preventDefault();
      const body = {
        customer_name: document.getElementById('resaName').value.trim(),
        date:          document.getElementById('resaDate').value,
        time:          document.getElementById('resaTime').value,
        party_size:    parseInt(document.getElementById('resaPax').value),
        phone:         document.getElementById('resaPhone').value.trim() || null,
        space:         document.getElementById('resaSpace').value || null,
        notes:         document.getElementById('resaNotes').value.trim() || null,
        status:        editId ? currentStatus : 'confirmed',
      };
      if (editId) {
        await api.put(`/api/reservations/${editId}`, body);
        showToast('Réservation mise à jour ✓', 'success');
      } else {
        await api.post('/api/reservations', body);
        showToast('Réservation créée ✓', 'success');
      }
      closeDrawer();
      loadWeek();
    }

    async function deleteResa() {
      if (!editId || !confirm('Supprimer cette réservation ?')) return;
      await fetch(`/api/reservations/${editId}`, { method:'DELETE' });
      closeDrawer();
      showToast('Réservation supprimée', 'info');
      loadWeek();
    }

    // ─── Drawer helpers ───────────────────────────────────────────
    function openDrawer() {
      document.getElementById('backdrop').classList.add('open');
      document.getElementById('mainDrawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('backdrop').classList.remove('open');
      document.getElementById('mainDrawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ─── Socket ───────────────────────────────────────────────────
    socket.on('reservation:updated', loadWeek);
    socket.on('reservation:deleted', loadWeek);
    socket.on('joy:synced', () => { loadWeek(); showToast('Joy.io synchronisé ✓', 'success'); });

    // ─── URL params ───────────────────────────────────────────────
    const _urlParams = new URLSearchParams(location.search);
    const urlDate    = _urlParams.get('date');
    const urlAssigned = _urlParams.get('assigned');
    if (urlDate) currentWeekStart = getMonday(new Date(urlDate));

    init().then(() => {
      if (urlAssigned === '1') showToast('Tables assignées avec succès ✓', 'success');
    });
  </script>
</body>
</html>
